<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Sliding Puzzle</title>
    <!-- Enllacem l'arxiu d'estils -->
    <link rel="stylesheet" href="estils.css">
</head>
<body>

    <h1>Sliding Puzzle</h1>

    <!-- Comptador de moviments -->
    <p>Moviments: <span id="comptador">0</span></p>

    <!-- Botó per reiniciar -->
    <button id="btnReset">Reset</button>

    <!-- Missatge que apareix quan el puzle està resolt -->
    <p id="missatgeResolt"></p>

    <!-- El tauler on van les peces -->
    <div id="tauler"></div>

    <!-- Enllacem l'arxiu JavaScript -->
    <script src="script.js"></script>
</body>
</html>
